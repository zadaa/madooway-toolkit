{{define "content"}}
<div class="auth-card">
    <div class="auth-card-header">
        <div class="auth-logo">
            <i class="fa-solid fa-list-check"></i>
            <span>MW Toolkit</span>
        </div>
        <h2>Selamat Datang Kembali</h2>
        <p>Masuk untuk mengelola dan memantau tugas-tugas Anda.</p>
    </div>
    
    <form action="/login" method="POST" class="auth-form">
        <div class="form-group">
            <label for="email">Email atau NIP</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input type="text" id="email" name="email" placeholder="nama@email.com atau NIP" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="password">Kata Sandi</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" name="password" placeholder="Masukkan kata sandi Anda" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>
    
    <div class="auth-card-footer">
        <p>Belum memiliki akun? <a href="/register">Daftar di sini</a></p>
    </div>
</div>
{{end}}
